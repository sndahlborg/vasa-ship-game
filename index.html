<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vasa: The Sunken Pride</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            image-rendering: pixelated;
            border: 4px solid #444;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(50, 100, 200, 0.3);
        }
        canvas { display: block; width: 100%; height: 100%; }
        #mobile-controls { display: none; }
        @media (max-width: 820px) {
            body {
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 8px 4px 0;
                gap: 10px;
                min-height: 100dvh;
            }
            #game-container {
                width: 100%;
                max-width: 800px;
                height: auto;
                aspect-ratio: 4 / 3;
                border-radius: 6px;
                flex-shrink: 0;
            }
            #mobile-controls {
                display: flex;
                width: 100%;
                max-width: 420px;
                justify-content: space-between;
                align-items: center;
                padding: 4px 20px 20px;
                flex-shrink: 0;
            }
            #dpad {
                display: grid;
                grid-template-columns: repeat(3, 56px);
                grid-template-rows: repeat(3, 56px);
                gap: 3px;
            }
            .dpad-btn {
                background: rgba(255,255,255,0.10);
                border: 2px solid rgba(255,255,255,0.22);
                border-radius: 10px;
                color: #ccc;
                font-size: 22px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                -webkit-tap-highlight-color: transparent;
                touch-action: none;
                transition: background 0.07s;
            }
            .dpad-btn.pressed, .dpad-btn:active { background: rgba(255,255,255,0.28); color: #fff; }
            .dpad-empty {}
            #action-btns { display: flex; flex-direction: column; gap: 14px; align-items: center; }
            .action-btn {
                width: 62px; height: 62px; border-radius: 50%; border: 3px solid;
                font-family: 'Press Start 2P', monospace; font-size: 11px;
                cursor: pointer; user-select: none; -webkit-user-select: none;
                -webkit-tap-highlight-color: transparent; touch-action: none;
                display: flex; align-items: center; justify-content: center;
                transition: opacity 0.07s;
            }
            #btn-a { background: rgba(80,200,120,0.20); border-color: rgba(80,200,120,0.65); color: #7edb8f; }
            #btn-b { background: rgba(200,80,80,0.15); border-color: rgba(200,80,80,0.45); color: #e08080; }
            .action-btn.pressed, .action-btn:active { opacity: 0.55; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div id="mobile-controls">
        <div id="dpad">
            <div class="dpad-empty"></div>
            <div class="dpad-btn" id="btn-up">▲</div>
            <div class="dpad-empty"></div>
            <div class="dpad-btn" id="btn-left">◀</div>
            <div class="dpad-empty"></div>
            <div class="dpad-btn" id="btn-right">▶</div>
            <div class="dpad-empty"></div>
            <div class="dpad-btn" id="btn-down">▼</div>
            <div class="dpad-empty"></div>
        </div>
        <div id="action-btns">
            <div class="action-btn" id="btn-a">A</div>
            <div class="action-btn" id="btn-b">B</div>
        </div>
    </div>
    <script src="game.js"></script>
    <script>
        (function () {
            const BTN_MAP = {
                'btn-up':'ArrowUp','btn-down':'ArrowDown','btn-left':'ArrowLeft',
                'btn-right':'ArrowRight','btn-a':' ','btn-b':'z'
            };
            function press(key) { if (typeof keys !== 'undefined') keys[key] = true; }
            function release(key) { if (typeof keys !== 'undefined') keys[key] = false; }
            Object.entries(BTN_MAP).forEach(([id, key]) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('pointerdown', e => { e.preventDefault(); el.setPointerCapture(e.pointerId); press(key); el.classList.add('pressed'); }, { passive: false });
                el.addEventListener('pointerup', e => { e.preventDefault(); release(key); el.classList.remove('pressed'); }, { passive: false });
                el.addEventListener('pointercancel', e => { release(key); el.classList.remove('pressed'); });
                el.addEventListener('pointerleave', e => { release(key); el.classList.remove('pressed'); });
            });
            const canvas = document.getElementById('gameCanvas');
            canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
            canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
        })();
    </script>
</body>
</html>
